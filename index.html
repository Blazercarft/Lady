<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lady ERP — A inteligência da sua loja</title>
    
    <meta name="description" content="Sistema Inteligente de Gestão e Vitrine Virtual para a Quarteto da Drikka.">
    <meta property="og:title" content="Lady ERP — Gestão Inteligente">
    <meta property="og:description" content="Consulte nosso catálogo e faça seu pedido direto pelo WhatsApp.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #8A2BE2;
            --purple-glow: #C8A2FF;
            --accent: #FFD700;
            --bg-canvas: #1E103D;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: #B3A4D4;
            --success: #00E676;
            --danger: #FF1744;
            --sidebar-width: 280px;
        }

        .light-theme {
            --bg-canvas: #F8F6FC;
            --surface: rgba(138, 43, 226, 0.04);
            --surface-border: rgba(138, 43, 226, 0.12);
            --text-primary: #1E103D;
            --text-secondary: #6B5B95;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .layout-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .app-sidebar {
            width: var(--sidebar-width);
            background: rgba(15, 7, 32, 0.6);
            border-right: 1px solid var(--surface-border);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .app-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            max-width: calc(100vw - var(--sidebar-width));
        }

        .nav-brand h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--purple-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: #FFFFFF;
            transform: translateX(4px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.2);
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary { background: var(--primary); color: #FFFFFF; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-accent { background: var(--accent); color: #1E103D; }
        .btn-accent:hover { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

        .view-pane { display: none; }
        .view-pane.pane-active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
        }

        .card-showcase {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card-showcase:hover {
            transform: translateY(-4px);
        }

        .card-showcase img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 16px;
        }

        #toast-wrapper {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast-alert {
            background: rgba(30, 16, 61, 0.95);
            border-left: 4px solid var(--primary);
            color: #FFFFFF;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(120%); }
            to { transform: translateX(0); }
        }

        @media (max-width: 992px) {
            .app-sidebar { width: 100%; height: auto; position: relative; }
            .app-main { margin-left: 0; max-width: 100%; padding: 20px; }
            .layout-wrapper { flex-direction: column; }
        }
    </style>
</head>
